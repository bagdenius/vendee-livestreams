services:
  postgres:
    container_name: vendee-livestreams-postgres
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - 5432:5432
    volumes:
      - vendee-livestreams-postgres-data:/var/lib/postgresql
    networks:
      - vendee-livestreams
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: vendee-livestreams-redis
    image: redis:8
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - 6379:6379
    volumes:
      - vendee-livestreams-redis-data:/data
    networks:
      - vendee-livestreams
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vendee-livestreams-postgres-data:
  vendee-livestreams-redis-data:

networks:
  vendee-livestreams:
