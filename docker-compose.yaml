services:
  postgres:
    container_name: vendee-livestreams-postgres
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - 5432:5432
    volumes:
      - vendee-livestreams-postgres-data:/var/lib/postgresql
    networks:
      - vendee-livestreams
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vendee-livestreams-postgres-data:

networks:
  vendee-livestreams:
